services:
  postgres:
    image: postgres:16.6
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_replication_slots=64
      - -c
      - max_wal_senders=64
    environment:
      POSTGRES_USER: cdc
      POSTGRES_PASSWORD: cdc
      POSTGRES_DB: app
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cdc -d app"]
      interval: 5s
      timeout: 5s
      retries: 24

  redpanda:
    image: redpandadata/redpanda:v24.3.5
    command:
      - redpanda
      - start
      - --mode
      - dev-container
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --overprovisioned
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr
      - internal://redpanda:9092,external://localhost:19092
    ports:
      - "19092:19092"
      - "9644:9644"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 5s
      timeout: 5s
      retries: 24

  connect:
    image: quay.io/debezium/connect:3.4
    depends_on:
      redpanda:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      BOOTSTRAP_SERVERS: redpanda:9092
      GROUP_ID: cdc-demo-connect
      CONFIG_STORAGE_TOPIC: cdc_demo_connect_configs
      OFFSET_STORAGE_TOPIC: cdc_demo_connect_offsets
      STATUS_STORAGE_TOPIC: cdc_demo_connect_statuses
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: "1"
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: "1"
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: "1"
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      REST_HOST_NAME: 0.0.0.0
      HEAP_OPTS: -Xms256m -Xmx512m
    ports:
      - "8083:8083"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8083/connectors >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 36

  opensearch:
    image: opensearchproject/opensearch:2.17.1
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m
      bootstrap.memory_lock: "false"
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200 >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 36
